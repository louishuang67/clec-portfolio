name: Update Stock Prices

on:
  schedule:
    # 每天 09:00 UTC = 台灣時間 17:00（收盤後）, 週一到週五
    - cron: '0 9 * * 1-5'
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stock prices
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, time, datetime

          TW_TICKERS = ['00662','006208','00692','00830','2330','1231','2382',
                        '00757','00675L','00631L','00670L','00865B','2890','2884','2881']
          US_TICKERS = ['QQQI','QQQM','VTI','BRK-B','QQXL']

          prices = {}

          # ── 台股：TWSE OpenAPI ──
          try:
            url = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL'
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=20) as r:
              data = json.loads(r.read())
            for item in data:
              if item['Code'] in TW_TICKERS:
                try:
                  prices[item['Code']] = float(item['ClosingPrice'])
                except:
                  pass
            print(f'台股取得 {len([k for k in prices if k in TW_TICKERS])} 支')
          except Exception as e:
            print(f'台股失敗: {e}')

          # ── 美股：Yahoo Finance ──
          for ticker in US_TICKERS:
            try:
              url = f'https://query2.finance.yahoo.com/v8/finance/chart/{ticker}?interval=1d&range=1d'
              req = urllib.request.Request(url, headers={
                'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
              })
              with urllib.request.urlopen(req, timeout=10) as r:
                d = json.loads(r.read())
              price = d['chart']['result'][0]['meta']['regularMarketPrice']
              prices[ticker] = round(price, 4)
              print(f'  {ticker}: {price}')
              time.sleep(0.3)
            except Exception as e:
              print(f'  {ticker} 失敗: {e}')

          now = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          output = {'prices': prices, 'updated': now}
          with open('prices.json', 'w', encoding='utf-8') as f:
            json.dump(output, f, ensure_ascii=False, indent=2)
          print(f'\n共 {len(prices)} 支，已寫入 prices.json')
          PYEOF

      - name: Commit prices.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update stock prices $(date +%Y-%m-%d)"
          git push
